version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: gophkeeper-client
    main: ./cmd/client
    binary: gophkeeper-client
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.buildDate={{.Date}}

archives:
  - id: gophkeeper-client
    ids: [gophkeeper-client]
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    # По умолчанию goreleaser кладёт в архив только license*/readme*/changelog* —
    # docs/ (скриншот и ТЗ, на которые ссылается README) нужно указать явно.
    files:
      - README.md
      - docs/*

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  # Релизится только клиент — сервер распространяется как Docker-образ
  name_template: "{{.Tag}}"
