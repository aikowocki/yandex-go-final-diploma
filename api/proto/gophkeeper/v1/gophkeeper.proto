syntax = "proto3";

package gophkeeper.v1;

option go_package = "github.com/aikowocki/yandex-go-final-diploma/api/proto/gen/gophkeeper/v1";

// AuthService — аутентификация и служебные методы.
service AuthService {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc SetupEncryption(SetupEncryptionRequest) returns (SetupEncryptionResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
}

// VaultService — CRUD папок
service VaultService {
  rpc CreateVault(CreateVaultRequest) returns (CreateVaultResponse);
  rpc ListVaults(ListVaultsRequest) returns (ListVaultsResponse);
}

// SecretService — секреты по тирам.
service SecretService {
  rpc CreateSecret(CreateSecretRequest) returns (CreateSecretResponse);
  rpc ListRow(ListRowRequest) returns (ListRowResponse);       // Tier 2a
  rpc ListIndex(ListIndexRequest) returns (ListIndexResponse); // Tier 2b
  rpc GetPayload(GetPayloadRequest) returns (GetPayloadResponse); // Tier 3
}

// TODO: BlobService — стриминг бинарных данных

// SecretType — тип секрета (открытое поле). Значения зеркалят server domain.SecretType.
enum SecretType {
  SECRET_TYPE_UNSPECIFIED = 0;
  SECRET_TYPE_LOGIN_PASSWORD = 1;
  SECRET_TYPE_TEXT = 2;
  SECRET_TYPE_BINARY = 3;
  SECRET_TYPE_BANK_CARD = 4;
  SECRET_TYPE_TOTP = 5;
}

message CreateVaultRequest {
  bytes wrapped_vault_key = 1; // VaultKey под MasterKey
  bytes enc_name = 2;          // имя папки под VaultKey
}

message CreateVaultResponse {
  string vault_id = 1;
}

message ListVaultsRequest {}

message Vault {
  string vault_id = 1;
  bytes wrapped_vault_key = 2;
  bytes enc_name = 3;
  int64 version = 4;
}

message ListVaultsResponse {
  repeated Vault vaults = 1;
}

message CreateSecretRequest {
  string vault_id = 1;
  SecretType type = 2;
  bytes enc_row = 3;
  bytes enc_index = 4;
  bytes enc_payload = 5; // может быть пустым
}

message CreateSecretResponse {
  string secret_id = 1;
}

message ListRowRequest {
  string vault_id = 1;
}

message SecretRow {
  string secret_id = 1;
  SecretType type = 2;
  int64 version = 3;
  bytes enc_row = 4;
}

message ListRowResponse {
  repeated SecretRow secrets = 1;
}

message ListIndexRequest {
  string vault_id = 1;
}

message SecretIndex {
  string secret_id = 1;
  int64 version = 2;
  bytes enc_index = 3;
}

message ListIndexResponse {
  repeated SecretIndex secrets = 1;
}

message GetPayloadRequest {
  string secret_id = 1;
}

message GetPayloadResponse {
  string secret_id = 1;
  SecretType type = 2;
  int64 version = 3;
  bytes enc_payload = 4;
}

message PingRequest {}

message PingResponse {
  string message = 1;
}

message RegisterRequest {
  string login = 1;
  bytes login_credential = 2; // уходит на сервер как есть, по TLS; сервер сам хеширует (Argon2id)
}

message RegisterResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message SetupEncryptionRequest {
  // user_id берётся из access-токена (JWT-интерцептор), в запросе не передаётся.
  bytes enc_kdf_salt = 1;
  bytes enc_kdf_params = 2; // JSON crypto.Params
}

message SetupEncryptionResponse {}

message LoginRequest {
  string login = 1;
  bytes login_credential = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  bytes enc_kdf_salt = 3;
  bytes enc_kdf_params = 4;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  bytes enc_kdf_salt = 3;
  bytes enc_kdf_params = 4;
}
