services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gophkeeper
      POSTGRES_PASSWORD: gophkeeper
      POSTGRES_DB: gophkeeper
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gophkeeper"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: gophkeeper
      MINIO_ROOT_PASSWORD: gophkeeper-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.server
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      GRPC_ADDR: ":9090"
      DATABASE_DSN: "postgres://gophkeeper:gophkeeper@postgres:5432/gophkeeper?sslmode=disable"
      JWT_SECRET: "dev-secret-change-me"
      LOG_LEVEL: "info"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "gophkeeper"
      MINIO_SECRET_KEY: "gophkeeper-minio"
      MINIO_BUCKET: "gophkeeper-blobs"
      MINIO_USE_SSL: "false"
    ports:
      - "9090:9090"

volumes:
  pgdata:
  miniodata:
